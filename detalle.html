<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detalle del planeta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    body { background-color: #000000; }

    #imagen-planeta {
      display: block;
      margin: 0 auto;
      max-width: 300px;
    }

    @keyframes tempReveal {
      from { opacity: 0; transform: translateY(30px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    .temp-box { display: none; }
    .temp-box.visible {
      display: block;
      animation: tempReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
  </style>
  <style>
    html, body {
      background-color: #000000 !important;
    }
    /* Asegura que las estrellas (body::before) sean visibles sobre fondo negro */
    body::before {
      background-image: url("https://www.transparenttextures.com/patterns/stardust.png") !important;
      opacity: 0.6 !important;
      z-index: 0 !important;
    }
  </style>
</head>

<body style="background-color: #000000 !important; position: relative;">
  <main class="container mt-5 text-center">
    <h1 id="nombre-planeta" class="text-white"></h1>
    <img id="imagen-planeta" class="img-fluid my-4" alt="">
    <p id="descripcion-planeta" class="text-white"></p>
    <button id="btn-temperatura" class="btn btn-primary mt-3">🌡 Conocer su temperatura</button>
    <div id="temperatura" class="temp-box mt-3"></div>
    <a href="index.html" class="btn btn-light mt-3">⬅ Volver</a>
  </main>

  <script src="assets/js/app.js"></script>
  <script>
    const btnTemp = document.getElementById('btn-temperatura');
    const tempBox = document.getElementById('temperatura');

    btnTemp.addEventListener('click', () => {
      tempBox.classList.remove('visible');
      void tempBox.offsetWidth; // reinicia la animación
      tempBox.classList.add('visible');
      btnTemp.style.display = 'none';
    });
  </script>
</body>
</html>
